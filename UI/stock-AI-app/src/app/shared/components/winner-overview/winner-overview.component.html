<div class="wnr_overview">
    <div class="m-3">
        <div class="row text-center">
            <h3>Overview</h3>
        </div>
        <div class="content text">
        <table class="table">
                <thead>
                    <tr>
                        <th scope="col">Name</th>
                        <th scope="col">Value</th>
                    </tr>
                </thead>
                <tbody>
                    @for(item of finalArr; track $index){
                        <tr>
                            <td>{{item.Name}}</td>
                            <td>{{item.Value}}</td>
                        </tr>
                    }
                </tbody>
            </table>
        </div>
    </div>
</div>
